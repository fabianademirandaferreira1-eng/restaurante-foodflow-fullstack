<!DOCTYPE html>
<html lang="en">
<head>
    <style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background-color: #fdf2e9; /* Um tom creme suave */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
    }
    h1 {
        color: #e67e22; /* Laranja cenoura/comida */
        font-size: 3rem;
        margin-bottom: 10px;
    }
    p {
        color: #555;
        font-size: 1.2rem;
    }
    button {
        background-color: #27ae60; /* Verde sucesso */
        color: white;
        border: none;
        padding: 15px 40px;
        font-size: 20px;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        transition: 0.3s;
    }
    button:hover {
        background-color: #2ecc71;
        transform: scale(1.05);
    }
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

</body>

</html>
