    <script>
        // Esta função faz os campos de Endereço/Mesa aparecerem ou sumirem
        function toggleEndereco(isDelivery) {
            const campoEndereco = document.getElementById('campo-endereco');
            const campoMesa = document.getElementById('campo-mesa');
            
            if (isDelivery) {
                campoEndereco.style.display = 'block';
                campoMesa.style.display = 'none';
            } else {
                campoEndereco.style.display = 'none';
                campoMesa.style.display = 'block';
            }
        }

        // Esta função avisa que o pedido foi feito
        function fazerPedido(item) {
            const tipo = document.querySelector('input[name="tipo"]:checked').value;
            alert("Sucesso! Pedido de " + item + " recebido para: " + tipo.toUpperCase());
        }
    </script>
</body>
