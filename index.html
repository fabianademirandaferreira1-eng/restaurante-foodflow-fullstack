<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FoodFlow - Novo Pedido</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .box { background: white; padding: 30px; border-radius: 10px; width: 350px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="box">
    <h2>📝 Novo Pedido</h2>
    <input type="text" id="cliente" placeholder="Nome do Cliente">
    <input type="text" id="item" placeholder="Item (Ex: Pizza)">
    <select id="tipo">
        <option value="local">Mesa (Local)</option>
        <option value="delivery">Delivery</option>
    </select>
    <input type="text" id="localizacao" placeholder="Mesa ou Endereço">
    <input type="number" id="preco" step="0.01" placeholder="Preço R$ (Ex: 25.50)">
    
    <button onclick="enviar()">Enviar Pedido</button>
</div>

<script>
async function enviar() {
    const dados = {
        cliente: document.getElementById('cliente').value,
        item: document.getElementById('item').value,
        tipo: document.getElementById('tipo').value,
        localizacao: document.getElementById('localizacao').value,
        preco: document.getElementById('preco').value, // O servidor vai converter para número
        hora: new Date().toLocaleTimeString()
    };

    if(!dados.item || !dados.preco) return alert("Preencha item e preço!");

    const res = await fetch('http://localhost:3000/pedido', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(dados)
    });

    if(res.ok) {
        alert("✅ Pedido enviado!");
        location.reload();
    } else {
        alert("❌ Erro ao enviar.");
    }
}
</script>
</body>
</html>
